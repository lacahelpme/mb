---
layout: default
---

<article class="article-page">
  <header class="article-header">
    <div class="container">
      <p class="article-kicker">MUSINGS</p>
      <h1 class="article-title">{{ page.title }}</h1>
      {% if page.date %}
      <p class="article-date">{{ page.date | date: "%B %d, %Y" }}</p>
      {% endif %}
    </div>
  </header>

  <div class="container article-body">
    {{ content }}
  </div>
</article>
