{% assign is_home = page.url == '/' %}

<header class="site-header {% if is_home %}site-header-home{% else %}site-header-subpage{% endif %}">
  <div class="container header-inner">
    <a class="logo logo-image" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/img/general/Michael-Berthold-Logo.png' | relative_url }}" alt="MB logo">
    </a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">

    <label for="nav-toggle" class="nav-toggle-label" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <nav class="primary-nav" aria-label="Primary navigation">
      <ul>
        <li>
          <a href="{{ '/#about' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">ABOUT ME</a>
        </li>
        <li>
          <a href="{{ '/musings/' | relative_url }}" class="{% if page.url contains '/musings' %}active{% endif %}">MUSINGS</a>
        </li>
        <li>
          <a href="{{ '/videos/' | relative_url }}" class="{% if page.url contains '/videos' %}active{% endif %}">VIDEOS</a>
        </li>
        <li>
          <a href="{{ '/publications/' | relative_url }}" class="{% if page.url contains '/publications' %}active{% endif %}">PUBLICATIONS</a>
        </li>
        <li>
          <a class="button button-accent button-header" href="{{ '/contact/' | relative_url }}">CONTACT</a>
        </li>
      </ul>
    </nav>
  </div>
</header>
