<footer class="site-footer" id="contact">
  <div class="container footer-grid">
    <div>
      <h2>Get in Touch</h2>
      <p>{{ site.data.site_settings.site_name }}</p>
    </div>

    <address>
      {% for line in site.data.site_settings.contact.address_lines %}
      <p>{{ line }}</p>
      {% endfor %}
      <p><a href="tel:{{ site.data.site_settings.contact.phone_link }}">{{ site.data.site_settings.contact.phone_display }}</a></p>
      <p><a href="mailto:{{ site.data.site_settings.contact.email }}">{{ site.data.site_settings.contact.email }}</a></p>
      <p><a href="{{ site.data.site_settings.contact.linkedin_url }}" target="_blank" rel="noopener noreferrer">LinkedIn</a></p>
      <p><a href="{{ site.data.site_settings.contact.scholar_url }}" target="_blank" rel="noopener noreferrer">Google Scholar</a></p>
    </address>
  </div>
</footer>
